{% load static tailwind_tags lb_tags %}
<!doctype html>
<html lang="en" data-theme="{% labb_theme_val %}">
    <head>
        <title>QDeploy</title>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="ie=edge" />
        <meta name="keywords" content="deployments" />
        <meta name="description" content="QDeploy: Quickly deploy your projects with ease." />
        {% tailwind_css %}
        <c-lb.m.dependencies setThemeEndpoint="{% url 'set_theme' %}" />
    </head>
    <body class="leading-normal tracking-normal">
        <c-lb.drawer drawerId="responsive-drawer" class="lg:drawer-open" sideClass="z-99 lg:z-40 h-full lg:h-screen">
            <c-slot name="sideContent">
                <div class="p-4 h-full bg-base-100 border-r border-r-base-200 w-64">
                    <h3 class="text-lg font-semibold mb-4">
                        QDeploy
                        <c-lb.dropdown alignment="start" size="sm" class="flex">
                            {% csrf_token %}
                            <c-lb.dropdown.trigger class="btn btn-sm">
                                <c-lbi.rmx.sun w="1.5em" h="1.5em" /> Theme
                            </c-lb.dropdown.trigger>
                            <c-lb.dropdown.content
                                class="bg-base-100 rounded-box w-52 shadow-md border border-base-200"
                            >
                                <c-lb.menu class="w-full">
                                    <input
                                        type="radio"
                                        name="theme"
                                        value="labb-light"
                                        class="theme-controller btn btn-ghost btn-sm justify-start"
                                        aria-label="Light"
                                    />
                                    <input
                                        type="radio"
                                        name="theme"
                                        value="labb-dark"
                                        class="theme-controller btn btn-ghost btn-sm justify-start"
                                        aria-label="Dark"
                                    />
                                </c-lb.menu>
                            </c-lb.dropdown.content>
                        </c-lb.dropdown>
                    </h3>
                    <c-lb.menu class="bg-base text-base-content rounded-box w-full">
                        <c-lb.menu.item title="Dashboard" />
                        <c-lb.menu.item title="Analytics" />
                        <c-lb.menu.item title="Reports" />
                        <c-lb.menu.item title="Settings" />
                    </c-lb.menu>
                    <div class="fixed left-0 bottom-0 w-full p-4 bg-base-100">
                        <form class="mt-auto text-right" action="{% url 'auth.logout' %}" method="post">
                            {% csrf_token %}
                            <c-lb.button>Logout</c-lb.button>
                        </form>
                    </div>
                </div>
            </c-slot>
            <c-lb.drawer.toggle for="responsive-drawer" class="btn lg:hidden">
                <c-lbi.rmx.side-bar />
            </c-lb.drawer.toggle>

            <div class="flex flex-col items-center justify-center p-4 h-full gap-4">
                <div class="container min-mx-5 mx-auto my-4">
                    {% block content %}
                    <div>yoo :3 pls use <code>% block content %</code> to edit this lool</div>
                    {% endblock content %}
                </div>
            </div>
        </c-lb.drawer>
    </body>
</html>
